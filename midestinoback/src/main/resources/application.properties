spring.application.name=midestinobd

server.port=${PORT:9999}
app.base-url=${APP_BASE_URL:http://localhost:9999}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/midestinobd}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

# ConfiguraciĂ³n de Groq Cloud
groq.api-key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}


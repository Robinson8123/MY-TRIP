spring.application.name=midestinobdsql

server.port=${PORT:9999}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/midestinobd?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

groq.api-key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

app.base-url=${APP_BASE_URL:http://localhost:9999}

payu.api-key=${PAYU_API_KEY:4Vj8eK4rloUd272L48hsrarnUA}
payu.merchant-id=${PAYU_MERCHANT_ID:508029}
payu.account-id=${PAYU_ACCOUNT_ID:512321}
